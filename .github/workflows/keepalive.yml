# Keep Railway API + Neon warm so first visitors don't wait for cold start (often 8–60s).
name: Keep API warm

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping jobs API
        run: |
          set -e
          API="${API_URL:-https://api-production-e35c.up.railway.app/api/v1}"
          curl -fsS --max-time 60 "$API/jobs/?page_size=1" -o /dev/null
          curl -fsS --max-time 60 "$API/jobs/filter-options/" -o /dev/null
          echo "OK $(date -u +%H:%M:%SZ)"
